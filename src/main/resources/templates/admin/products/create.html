<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head></head>
<body>
<div th:fragment="content">

    <div class="card card-modern p-5 col-md-8 mx-auto">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/products/index}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0">Create New Product</h3>
        </div>


        <form th:action="@{/admin/products/create}" th:object="${product}"
                  method="post" enctype="multipart/form-data">
            <div class="row g-4">

                <!-- Name EN -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Name (English)</label>
                    <input type="text" class="form-control" th:field="*{nameEn}" placeholder="Enter English name">
                </div>

                <!-- Name AR -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Name (Arabic)</label>
                    <input type="text" class="form-control" th:field="*{nameAr}" placeholder="Enter Arabic name">
                </div>

                <!-- Description EN -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Description (English)</label>
                    <textarea class="form-control" th:field="*{descriptionEn}" rows="3" placeholder="Enter English description"></textarea>
                </div>

                <!-- Description AR -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Description (Arabic)</label>
                    <textarea class="form-control" th:field="*{descriptionAr}" rows="3" placeholder="Enter Arabic description"></textarea>
                </div>

                <!-- Price -->
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Price ($)</label>
                    <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" placeholder="0.00">
                </div>

                <!-- Stock -->
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Stock</label>
                    <input type="number" min="0" class="form-control" th:field="*{stock}" placeholder="0">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Product Image <span class="text-muted fw-normal">(optional)</span></label>
                    <input type="file" class="form-control" name="imageFile" accept="image/*" onchange="previewImage(this)">
                    <div id="imagePreview" class="mt-3" style="display:none">
                        <img id="previewImg" src="#" alt="Preview"
                             style="max-height:200px; max-width:100%; border-radius:10px; object-fit:cover;">
                    </div>
                </div>
                <!-- Category -->
<!--                <div class="col-md-4">-->
<!--                    <label class="form-label fw-semibold">Category</label>-->
<!--                    <select class="form-select" th:field="*{categoryId}">-->
<!--                        <option value="">— Select Category —</option>-->
<!--                        <option th:each="cat : ${categories}"-->
<!--                                th:value="${cat.id}"-->
<!--                                th:text="${cat.nameEn}">-->
<!--                        </option>-->
<!--                    </select>-->
<!--                </div>-->
                <!-- Category Selection -->
                <!-- Category Selection -->
                <div class="col-12">
                    <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>

                    <div class="row g-3">

                        <!-- Level 1: Main Section -->
                        <div class="col-md-4">
                            <label class="form-label text-muted" style="font-size:13px">
                                <i class="bi bi-layers me-1"></i>Main Section
                            </label>
                            <select class="form-select" id="mainSelect">
                                <option value="">— Select Main —</option>
                                <option th:each="cat : ${mainCategories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.nameEn}">
                                </option>
                            </select>
                        </div>

                        <!-- Level 2: Section -->
                        <div class="col-md-4" id="sectionWrap" style="display:none">
                            <label class="form-label text-muted" style="font-size:13px">
                                <i class="bi bi-folder me-1"></i>Section
                            </label>
                            <select class="form-select" id="sectionSelect">
                                <option value="">— Select Section —</option>
                            </select>
                        </div>

                        <!-- Level 3: Sub Section -->
                        <div class="col-md-4" id="subWrap" style="display:none">
                            <label class="form-label text-muted" style="font-size:13px">
                                <i class="bi bi-folder2 me-1"></i>Sub Section
                            </label>
                            <select class="form-select" id="subSelect">
                                <option value="">— Select Sub Section —</option>
                            </select>
                        </div>

                    </div>

                    <!-- Hidden field submitted with form -->
                    <input type="hidden" th:field="*{categoryId}" id="categoryIdInput">

                    <!-- Selection indicator -->
                    <div id="categoryHint" class="form-text mt-2 d-flex align-items-center gap-2">
                        <i class="bi bi-info-circle"></i>
                        <span id="categoryHintText">Select a main section to begin.</span>
                    </div>
                    <div id="categorySelected" class="mt-2" style="display:none">
        <span class="badge bg-success px-3 py-2">
            <i class="bi bi-check-circle me-1"></i>
            <span id="categorySelectedLabel"></span>
        </span>
                    </div>

                </div>

                <script>
                    // ── Helpers ──────────────────────────────────────────────────────────

                    function loadChildren(parentId, wrapId, selectId, placeholder, callback) {
                        fetch(`/admin/categories/children/${parentId}`)
                            .then(r => r.json())
                            .then(children => {
                                const sel = document.getElementById(selectId);
                                sel.innerHTML = `<option value="">${placeholder}</option>`;
                                if (children.length > 0) {
                                    children.forEach(c => {
                                        const opt = document.createElement('option');
                                        opt.value = c.id;
                                        opt.text  = c.nameEn;
                                        sel.appendChild(opt);
                                    });
                                    document.getElementById(wrapId).style.display = '';
                                } else {
                                    document.getElementById(wrapId).style.display = 'none';
                                }
                                if (callback) callback(children);
                            });
                    }

                    function resetDropdown(wrapId, selectId, placeholder) {
                        document.getElementById(wrapId).style.display = 'none';
                        document.getElementById(selectId).innerHTML = `<option value="">${placeholder}</option>`;
                    }

                    function assignCategory(id, label) {
                        document.getElementById('categoryIdInput').value = id || '';
                        document.getElementById('categoryHint').style.display      = id ? 'none' : '';
                        document.getElementById('categorySelected').style.display  = id ? '' : 'none';
                        if (id) document.getElementById('categorySelectedLabel').textContent = label;
                    }

                    // ── Level 1: Main ────────────────────────────────────────────────────

                    document.getElementById('mainSelect').addEventListener('change', function () {
                        const id   = this.value;
                        const name = this.options[this.selectedIndex].text;

                        resetDropdown('sectionWrap', 'sectionSelect', '— Select Section —');
                        resetDropdown('subWrap',     'subSelect',     '— Select Sub Section —');

                        if (!id) {
                            assignCategory(null, null);
                            document.getElementById('categoryHintText').textContent = 'Select a main section to begin.';
                            return;
                        }

                        // Tentatively assign main — may be overridden by section selection
                        assignCategory(id, name);
                        document.getElementById('categoryHintText').textContent = 'You can refine further by selecting a section.';

                        loadChildren(id, 'sectionWrap', 'sectionSelect', '— Select Section —', function(children) {
                            if (!children.length) {
                                // No sections — main is final
                                document.getElementById('categoryHintText').textContent = '';
                            }
                        });
                    });

                    // ── Level 2: Section ─────────────────────────────────────────────────

                    document.getElementById('sectionSelect').addEventListener('change', function () {
                        const id   = this.value;
                        const name = this.options[this.selectedIndex].text;

                        resetDropdown('subWrap', 'subSelect', '— Select Sub Section —');

                        if (!id) {
                            // Revert to main
                            const mainId   = document.getElementById('mainSelect').value;
                            const mainName = document.getElementById('mainSelect').options[
                                document.getElementById('mainSelect').selectedIndex].text;
                            assignCategory(mainId, mainName);
                            document.getElementById('categoryHintText').textContent = 'You can refine further by selecting a section.';
                            return;
                        }

                        assignCategory(id, name);
                        document.getElementById('categoryHintText').textContent = 'You can refine further by selecting a sub section.';

                        loadChildren(id, 'subWrap', 'subSelect', '— Select Sub Section —', function(children) {
                            if (!children.length) {
                                document.getElementById('categoryHintText').textContent = '';
                            }
                        });
                    });

                    // ── Level 3: Sub Section ─────────────────────────────────────────────

                    document.getElementById('subSelect').addEventListener('change', function () {
                        const id   = this.value;
                        const name = this.options[this.selectedIndex].text;

                        if (!id) {
                            // Revert to section
                            const secId   = document.getElementById('sectionSelect').value;
                            const secName = document.getElementById('sectionSelect').options[
                                document.getElementById('sectionSelect').selectedIndex].text;
                            assignCategory(secId, secName);
                            document.getElementById('categoryHintText').textContent = 'You can refine further by selecting a sub section.';
                            return;
                        }

                        assignCategory(id, name);
                        document.getElementById('categoryHintText').textContent = '';
                    });
                </script>


                <!-- Installment Details -->
                <div class="col-12">
                    <label class="form-label fw-semibold">
                        Installment Details <span class="text-muted fw-normal">(optional)</span>
                    </label>
                    <textarea class="form-control" th:field="*{installmentDetails}" rows="2"
                              placeholder="e.g. 12 months × $50/month"></textarea>
                </div>

            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> Save Product
                </button>
                <a th:href="@{/admin/products/index}" class="btn btn-outline-secondary">Cancel</a>
            </div>

        </form>
    </div>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const img     = document.getElementById('previewImg');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    img.src = e.target.result;
                    preview.style.display = '';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.style.display = 'none';
            }
        }
    </script>
</div>
</body>
</html>
