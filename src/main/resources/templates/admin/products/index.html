<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head></head>
<body>
<div th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Products</h2>
        <a th:href="@{/admin/products/create}" class="btn btn-primary">+ Add Product</a>
    </div>

    <!-- Filter Bar -->
    <div class="card card-modern p-3 mb-4">
        <div class="d-flex align-items-center gap-3 flex-wrap">

            <!-- Level 1: Main Category -->
            <div>
                <label class="form-label fw-semibold mb-1" style="font-size:12px">Main Category</label>
                <select id="filterMain" class="form-select" style="width:180px">
                    <option value="">All</option>
                    <option th:each="cat : ${mainCategories}"
                            th:value="${cat.id}"
                            th:text="${cat.nameEn}"
                            th:selected="${cat.id == selectedCategoryId}">
                    </option>
                </select>
            </div>

            <!-- Level 2: Section (hidden until main selected) -->
            <div id="filterSectionWrap" style="display:none">
                <label class="form-label fw-semibold mb-1" style="font-size:12px">Section</label>
                <select id="filterSection" class="form-select" style="width:180px">
                    <option value="">All Sections</option>
                </select>
            </div>

            <!-- Level 3: Sub Section (hidden until section selected) -->
            <div id="filterSubWrap" style="display:none">
                <label class="form-label fw-semibold mb-1" style="font-size:12px">Sub Section</label>
                <select id="filterSub" class="form-select" style="width:180px">
                    <option value="">All Sub Sections</option>
                </select>
            </div>

            <!-- Active filter badge -->
            <div id="activeFilterBadge" class="ms-2" style="display:none; align-self:flex-end; padding-bottom:4px">
                <span class="badge bg-primary d-flex align-items-center gap-2 px-3 py-2">
                    <span id="activeFilterLabel"></span>
                    <i class="bi bi-x-circle" style="cursor:pointer" onclick="clearFilter()"></i>
                </span>
            </div>

            <!-- View toggle -->
            <div class="ms-auto" style="align-self:flex-end; padding-bottom:4px">
                <div class="btn-group">
                    <button id="btnCards" class="btn btn-sm btn-outline-primary" onclick="setView('cards')">
                        <i class="bi bi-grid-3x3-gap"></i> Cards
                    </button>
                    <button id="btnTable" class="btn btn-sm btn-outline-primary" onclick="setView('table')">
                        <i class="bi bi-table"></i> Table
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Container — rendered by JS -->
    <div id="productsContainer">

        <!-- Empty State -->
        <div id="emptyState" style="display:none" class="card card-modern p-5 text-center text-muted">
            <i class="bi bi-box-seam" style="font-size:48px; opacity:0.3"></i>
            <p class="mt-3 mb-0">No products found</p>
            <a th:href="@{/admin/products/create}" class="btn btn-primary btn-sm mt-3">+ Add Product</a>
        </div>

        <!-- Card View -->
        <div id="cardView" class="row g-4"></div>

        <!-- Table View -->
        <div id="tableView" style="display:none">
            <div class="card card-modern p-4">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Image</th>
                        <th>Name (English)</th>
                        <th>Name (Arabic)</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        // ── State ──────────────────────────────────────────
        let currentView    = /*[[${viewMode}]]*/ 'cards';
        let allProducts    = /*[[${products}]]*/ [];
        let activeCatId    = /*[[${selectedCategoryId}]]*/ null;
        let activeCatLabel = '';

        // ── Init ───────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            setView(currentView, false);
            renderProducts(allProducts);

            // If a category was pre-selected (e.g. page reload with ?categoryId=X),
            // pre-load its children and mark the active filter
            if (activeCatId) {
                const mainSel = document.getElementById('filterMain');
                const matchedMain = [...mainSel.options].find(o => o.value == activeCatId);
                if (matchedMain) {
                    mainSel.value = activeCatId;
                    activeCatLabel = matchedMain.text;
                    showActiveFilter(matchedMain.text);
                    loadChildren(activeCatId, 'filterSectionWrap', 'filterSection', 'All Sections');
                }
            }
        });

        // ── View toggle ────────────────────────────────────
        function setView(v, rerender = true) {
            currentView = v;
            document.getElementById('cardView').style.display  = v === 'cards' ? '' : 'none';
            document.getElementById('tableView').style.display = v === 'table' ? '' : 'none';
            document.getElementById('btnCards').classList.toggle('active', v === 'cards');
            document.getElementById('btnTable').classList.toggle('active', v === 'table');
            if (rerender) renderProducts(allProducts);
        }

        // ── Category dropdowns ─────────────────────────────
        document.getElementById('filterMain').addEventListener('change', function () {
            const id   = this.value;
            const name = this.options[this.selectedIndex].text;

            // Reset lower levels
            resetDropdown('filterSectionWrap', 'filterSection', 'All Sections');
            resetDropdown('filterSubWrap',     'filterSub',     'All Sub Sections');

            if (!id) {
                clearFilter();
                return;
            }

            // Load sections
            loadChildren(id, 'filterSectionWrap', 'filterSection', 'All Sections');

            // Filter by main
            filterByCategory(id, name);
        });

        document.getElementById('filterSection').addEventListener('change', function () {
            const id   = this.value;
            const name = this.options[this.selectedIndex].text;

            // Reset sub level
            resetDropdown('filterSubWrap', 'filterSub', 'All Sub Sections');

            if (!id) {
                // revert to main filter
                const mainId   = document.getElementById('filterMain').value;
                const mainName = document.getElementById('filterMain').options[
                    document.getElementById('filterMain').selectedIndex].text;
                filterByCategory(mainId, mainName);
                return;
            }

            loadChildren(id, 'filterSubWrap', 'filterSub', 'All Sub Sections');
            filterByCategory(id, name);
        });

        document.getElementById('filterSub').addEventListener('change', function () {
            const id   = this.value;
            const name = this.options[this.selectedIndex].text;

            if (!id) {
                // revert to section filter
                const secId   = document.getElementById('filterSection').value;
                const secName = document.getElementById('filterSection').options[
                    document.getElementById('filterSection').selectedIndex].text;
                filterByCategory(secId, secName);
                return;
            }

            filterByCategory(id, name);
        });

        // ── Load children via AJAX ─────────────────────────
        function loadChildren(parentId, wrapId, selectId, placeholder) {
            fetch(`/admin/categories/children/${parentId}`)
                .then(r => r.json())
                .then(children => {
                    if (!children.length) return; // no children, keep dropdown hidden
                    const sel = document.getElementById(selectId);
                    sel.innerHTML = `<option value="">${placeholder}</option>`;
                    children.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.id;
                        opt.text  = c.nameEn;
                        sel.appendChild(opt);
                    });
                    document.getElementById(wrapId).style.display = '';
                });
        }

        // ── Filter products via AJAX ───────────────────────
        function filterByCategory(categoryId, label) {
            activeCatId    = categoryId;
            activeCatLabel = label;
            showActiveFilter(label);

            fetch(`/admin/products/filter?categoryId=${categoryId}`)
                .then(r => r.json())
                .then(data => {
                    allProducts = data;
                    renderProducts(data);
                });
        }

        function clearFilter() {
            activeCatId = null;
            document.getElementById('filterMain').value = '';
            resetDropdown('filterSectionWrap', 'filterSection', 'All Sections');
            resetDropdown('filterSubWrap',     'filterSub',     'All Sub Sections');
            document.getElementById('activeFilterBadge').style.display = 'none';

            fetch('/admin/products/filter')
                .then(r => r.json())
                .then(data => {
                    allProducts = data;
                    renderProducts(data);
                });
        }

        function resetDropdown(wrapId, selectId, placeholder) {
            document.getElementById(wrapId).style.display = 'none';
            document.getElementById(selectId).innerHTML = `<option value="">${placeholder}</option>`;
        }

        function showActiveFilter(label) {
            document.getElementById('activeFilterLabel').textContent = 'Filtered: ' + label;
            document.getElementById('activeFilterBadge').style.display = 'flex';
        }

        // ── Render ─────────────────────────────────────────
        function renderProducts(products) {
            if (!products || !products.length) {
                document.getElementById('emptyState').style.display = '';
                document.getElementById('cardView').style.display   = 'none';
                document.getElementById('tableView').style.display  = 'none';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            if (currentView === 'cards') {
                document.getElementById('cardView').style.display  = '';
                document.getElementById('tableView').style.display = 'none';
                renderCards(products);
            } else {
                document.getElementById('cardView').style.display  = 'none';
                document.getElementById('tableView').style.display = '';
                renderTable(products);
            }
        }

        function stockBadge(stock) {
            if (stock === 0)        return '<span class="badge bg-danger ms-1">Out</span>';
            if (stock > 0 && stock < 10) return '<span class="badge bg-warning ms-1">Low</span>';
            return '';
        }

        function renderCards(products) {
    const container = document.getElementById('cardView');
    container.innerHTML = products.map((p, i) => `
        <div class="col-md-4">
            <div class="card card-modern h-100 d-flex flex-column" style="overflow:hidden">

                <!-- Image area — centered with padding on sides -->
                <div style="background:#f8fafc; padding: 20px 30px 0 30px;">
                    <div style="height:180px; border-radius:10px; overflow:hidden; background:#eef2f7;
                                display:flex; align-items:center; justify-content:center;">
                        ${p.imageUrl
                            ? `<img src="${p.imageUrl}" alt="${p.nameEn}"
                                   style="width:100%; height:100%; object-fit:contain;">`
                            : `<i class="bi bi-image" style="font-size:52px; opacity:0.15; color:#64748b"></i>`
                        }
                    </div>
                </div>

                <!-- Card Body -->
                <div class="p-4 d-flex flex-column flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <h5 class="fw-semibold mb-0" style="font-size:15px">${p.nameEn}</h5>
                        <span class="badge-count ms-2 flex-shrink-0">${i + 1}</span>
                    </div>
                    <p class="text-muted small mb-3">${p.nameAr}</p>

                    <div class="d-flex gap-2 mb-3">
                        <span class="badge bg-success fs-6">$${p.price}</span>
                        <span class="badge bg-secondary">Stock: ${p.stock}</span>
                    </div>

                    <p class="text-muted small mb-3">
                        <i class="bi bi-tag me-1"></i>${p.categoryTitleEn ?? '—'}
                    </p>

                    <div class="mt-auto d-flex justify-content-end gap-2">
                        <a href="/admin/products/details/${p.id}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a href="/admin/products/edit/${p.id}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a href="/admin/products/delete/${p.id}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>

            </div>
        </div>`).join('');
}

function renderTable(products) {
    document.getElementById('tableBody').innerHTML = products.map((p, i) => `
        <tr style="vertical-align:middle">
            <td>${i + 1}</td>
            <td>
                <div style="width:64px; height:64px; border-radius:10px; overflow:hidden;
                            background:#f1f5f9; display:flex; align-items:center;
                            justify-content:center; padding:5px;">
                    ${p.imageUrl
                        ? `<img src="${p.imageUrl}" alt="${p.nameEn}"
                               style="max-width:100%; max-height:100%; object-fit:contain;
                                      border-radius:6px;">`
                        : `<i class="bi bi-image" style="font-size:22px; opacity:0.2; color:#64748b"></i>`
                    }
                </div>
            </td>
            <td>
                <div class="fw-semibold" style="font-size:14px">${p.nameEn}</div>
                <div class="text-muted small">${p.nameAr}</div>
            </td>
            <td>${p.categoryTitleEn ?? '—'}</td>
            <td><span class="badge bg-success">$${p.price}</span></td>
            <td>${p.stock} ${stockBadge(p.stock)}</td>
            <td class="text-end">
                <a href="/admin/products/details/${p.id}" class="btn btn-sm btn-outline-secondary me-1">
                    <i class="bi bi-eye"></i>
                </a>
                <a href="/admin/products/edit/${p.id}" class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-pencil"></i>
                </a>
                <a href="/admin/products/delete/${p.id}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>`).join('');
}
    </script>

</div>
</body>
</html>
