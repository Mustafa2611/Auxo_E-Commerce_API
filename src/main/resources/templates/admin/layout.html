<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <title>Auxo Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 20px 20px 18px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand img {
            height: 26px;
            width: auto;
            /* invert to white for dark sidebar */
            filter: brightness(0) invert(1);
        }

        .brand-sub {
            color: #475569;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

        .nav-section-label {
            color: #475569;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 10px;
            margin: 18px 0 6px;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .nav-item a:hover { background: #1e293b; color: #e2e8f0; }
        .nav-item a.active { background: #1a56ff; color: white; }
        .nav-item a i { font-size: 16px; width: 18px; text-align: center; flex-shrink: 0; }

        /* Store link — special accent */
        .nav-store-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s ease;
            border: 1px solid #0c4a6e;
            margin: 4px 0;
        }
        .nav-store-link:hover { background: #0c4a6e; color: #7dd3fc; }
        .nav-store-link i { font-size: 16px; width: 18px; text-align: center; }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #1e293b;
        }

        /* User card in sidebar footer */
        .sidebar-user-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: #1a56ff;
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            flex-shrink: 0;
        }
        .sidebar-user-info { flex: 1; min-width: 0; }
        .sidebar-user-name {
            color: #f1f5f9;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-user-role {
            color: #64748b;
            font-size: 11px;
            margin-top: 1px;
        }

        .sidebar-logout {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            color: #f87171;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s ease;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
        }
        .sidebar-logout:hover { background: #1e293b; color: #fca5a5; }
        .sidebar-logout i { font-size: 16px; width: 18px; }

        /* ── Topbar ── */
        .main-wrapper {
            margin-left: 250px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: white;
            padding: 0 32px;
            height: 60px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-weight: 700;
            font-size: 18px;
            color: #1e293b;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Topbar user pill */
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px 5px 5px;
            border: 1px solid #e2e8f0;
            border-radius: 100px;
            background: #f8fafc;
            cursor: pointer;
            position: relative;
            transition: border-color .15s, background .15s;
        }
        .topbar-user:hover { border-color: #1a56ff; background: #eff4ff; }
        .topbar-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #1a56ff;
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            flex-shrink: 0;
        }
        .topbar-username {
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
        }

        /* Topbar dropdown */
        .topbar-user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            padding: 6px;
            min-width: 200px;
            opacity: 0; visibility: hidden; transform: translateY(-6px);
            transition: opacity .18s, transform .18s, visibility .18s;
            z-index: 200;
        }
        .topbar-user-dropdown.open {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .topbar-dd-info {
            padding: 10px 12px 8px;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 4px;
        }
        .topbar-dd-name { font-weight: 600; font-size: 14px; color: #1e293b; }
        .topbar-dd-email { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .topbar-dd-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border-radius: 8px;
            color: #374151; font-size: 13px; text-decoration: none;
            transition: background .12s;
            cursor: pointer; background: none; border: none; width: 100%;
            font-family: 'Inter', sans-serif;
        }
        .topbar-dd-item:hover { background: #f8fafc; color: #1e293b; }
        .topbar-dd-item.danger { color: #dc2626; }
        .topbar-dd-item.danger:hover { background: #fff1f1; }
        .topbar-dd-item i { font-size: 14px; }

        .topbar-icon-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; font-size: 16px; cursor: pointer;
            text-decoration: none;
            transition: border-color .15s, color .15s, background .15s;
        }
        .topbar-icon-btn:hover { border-color: #1a56ff; color: #1a56ff; background: #eff4ff; }

        .page-content { padding: 28px 32px; flex: 1; }

        /* ── Cards & Tables ── */
        .page-title { font-weight: 700; font-size: 24px; color: #1e293b; }

        .card-modern {
            border: none;
            border-radius: 14px;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
        }

        .btn-primary {
            background-color: #1a56ff;
            border: none;
            border-radius: 8px;
            padding: 9px 20px;
            font-weight: 500;
        }
        .btn-primary:hover { background-color: #0038e0; }
        .btn-outline-primary { border-radius: 8px; }

        .table thead { background-color: #f8fafc; }
        .table thead th {
            font-weight: 600; font-size: 12px;
            color: #64748b; border-bottom: 2px solid #e2e8f0;
            text-transform: uppercase; letter-spacing: .04em;
        }

        .badge-count {
            background: #eff6ff; color: #2563eb;
            font-size: 12px; padding: 4px 10px;
            border-radius: 20px; font-weight: 600;
        }

        .stat-card {
            border: none; border-radius: 14px;
            box-shadow: 0 1px 8px rgba(0,0,0,.06);
            padding: 22px;
        }

        .stat-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
    </style>
</head>

<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <div>
            <img src="/images/auxo-logo.svg" alt="Auxo">
            <div class="brand-sub">Admin Panel</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/admin}" th:classappend="${activePage == 'dashboard'} ? ' active'">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
            </li>
        </ul>

        <div class="nav-section-label">Catalog</div>
        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/admin/categories/index}" th:classappend="${activePage == 'categories'} ? ' active'">
                    <i class="bi bi-tag"></i> Categories
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/products/index}" th:classappend="${activePage == 'products'} ? ' active'">
                    <i class="bi bi-box-seam"></i> Products
                </a>
            </li>
        </ul>

        <div class="nav-section-label">Management</div>
        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/admin/orders}" th:classappend="${activePage == 'orders'} ? ' active'">
                    <i class="bi bi-receipt"></i> Orders
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/settings}" th:classappend="${activePage == 'settings'} ? ' active'">
                    <i class="bi bi-gear"></i> Settings
                </a>
            </li>
        </ul>

        <div class="nav-section-label">Navigation</div>
        <ul class="nav flex-column gap-1">
            <li>
                <a href="/" class="nav-store-link">
                    <i class="bi bi-shop"></i> Back to Store
                </a>
            </li>
        </ul>
    </nav>

    <!-- Sidebar footer: user card + logout -->
    <div class="sidebar-footer">
        <div class="sidebar-user-card">
            <div class="sidebar-avatar" id="sidebarAvatar">?</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarUsername">Loading…</div>
                <div class="sidebar-user-role" id="sidebarRole">Admin</div>
            </div>
        </div>
        <button class="sidebar-logout" onclick="doAdminLogout()">
            <i class="bi bi-box-arrow-left"></i> Sign out
        </button>
    </div>
</aside>

<!-- ── Main ── -->
<div class="main-wrapper">
    <div class="topbar">
        <div class="topbar-title" th:text="${pageTitle} ?: 'Dashboard'"></div>
        <div class="topbar-right">
            <!-- Bell -->
            <a href="#" class="topbar-icon-btn"><i class="bi bi-bell"></i></a>

            <!-- Back to store -->
            <a href="/" class="topbar-icon-btn" title="Back to store">
                <i class="bi bi-shop"></i>
            </a>

            <!-- User pill with dropdown -->
            <div class="topbar-user" id="topbarUserBtn" onclick="toggleTopbarMenu()">
                <div class="topbar-avatar" id="topbarAvatar">?</div>
                <span class="topbar-username" id="topbarUsername">Admin</span>
                <i class="bi bi-chevron-down" style="font-size:10px;color:#94a3b8;margin-left:2px;"></i>

                <div class="topbar-user-dropdown" id="topbarDropdown">
                    <div class="topbar-dd-info">
                        <div class="topbar-dd-name" id="dropName">Admin</div>
                        <div class="topbar-dd-email" id="dropEmail"></div>
                    </div>
                    <a href="/" class="topbar-dd-item">
                        <i class="bi bi-shop"></i> Back to Store
                    </a>
                    <a href="/profile" class="topbar-dd-item">
                        <i class="bi bi-person"></i> Profile
                    </a>
                    <div style="height:1px;background:#f1f5f9;margin:4px 0;"></div>
                    <button class="topbar-dd-item danger" onclick="doAdminLogout()">
                        <i class="bi bi-box-arrow-left"></i> Sign out
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-content">
        <th:block th:replace="${content}"></th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Decode JWT directly — source of truth ───────────────────
    (function () {
        const token = localStorage.getItem('auxo_token');
        if (!token) {
            // No token — redirect to login
            window.location.href = '/auth/login';
            return;
        }

        try {
            const payload = JSON.parse(atob(token.split('.')[1]));

            // Check expiry
            if (payload.exp * 1000 < Date.now()) {
                localStorage.removeItem('auxo_token');
                localStorage.removeItem('auxo_user');
                window.location.href = '/auth/login';
                return;
            }

            // Extract claims set in JwtService.generateToken()
            const name  = payload.username || 'Admin';
            const email = payload.sub      || '';   // subject = email
            const roles = payload.roles    || [];
            const init  = name.charAt(0).toUpperCase();
            const roleLabel = roles.join(', ') || 'Admin';

            // Sidebar
            document.getElementById('sidebarAvatar').textContent  = init;
            document.getElementById('sidebarUsername').textContent = name;
            document.getElementById('sidebarRole').textContent     = roleLabel;

            // Topbar
            document.getElementById('topbarAvatar').textContent   = init;
            document.getElementById('topbarUsername').textContent  = name;
            document.getElementById('dropName').textContent        = name;
            document.getElementById('dropEmail').textContent       = email;

        } catch(e) {
            window.location.href = '/auth/login';
        }
    })();

    // ── Topbar dropdown toggle ────────────────────────────────────
    function toggleTopbarMenu() {
        event.stopPropagation();
        document.getElementById('topbarDropdown').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const btn = document.getElementById('topbarUserBtn');
        if (btn && !btn.contains(e.target)) {
            document.getElementById('topbarDropdown')?.classList.remove('open');
        }
    });

    // ── Logout ───────────────────────────────────────────────────
    function doAdminLogout() {
        localStorage.removeItem('auxo_token');
        localStorage.removeItem('auxo_user');
        window.location.href = '/auth/login';
    }
</script>
</body>
</html>
