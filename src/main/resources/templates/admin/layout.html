<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <title>Admin Panel</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #1e293b;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .brand-name {
            color: white;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.2;
        }

        .brand-name span {
            color: #94a3b8;
            font-weight: 400;
            font-size: 12px;
            display: block;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
        }

        .nav-section-label {
            color: #64748b;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0 10px;
            margin: 16px 0 8px;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .nav-item a:hover {
            background: #334155;
            color: #e2e8f0;
        }

        .nav-item a.active {
            background: #2563eb;
            color: white;
        }

        .nav-item a i {
            font-size: 17px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid #334155;
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        .sidebar-footer a:hover {
            background: #334155;
            color: #e2e8f0;
        }

        /* ── Main Content ── */
        .main-wrapper {
            margin-left: 250px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: white;
            padding: 16px 32px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-weight: 700;
            font-size: 20px;
            color: #1e293b;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .page-content {
            padding: 32px;
            flex: 1;
        }

        /* ── Cards & Tables ── */
        .page-title {
            font-weight: 700;
            font-size: 26px;
            color: #1e293b;
        }

        .card-modern {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .btn-primary {
            background-color: #2563eb;
            border: none;
            border-radius: 10px;
            padding: 9px 20px;
            font-weight: 500;
        }

        .btn-primary:hover { background-color: #1d4ed8; }

        .btn-outline-primary { border-radius: 8px; }

        .table thead { background-color: #f8fafc; }
        .table thead th { font-weight: 600; font-size: 13px; color: #64748b; border-bottom: 2px solid #e2e8f0; }

        .badge-count {
            background: #eff6ff;
            color: #2563eb;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .stat-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 24px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
    </style>
</head>

<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">E</div>
        <div class="brand-name">
            ElectroShop
            <span>Admin Panel</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>

        <ul class="nav flex-column gap-1 nav-item">
            <li class="nav-item">
                <a th:href="@{/admin}" th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
            </li>
        </ul>

        <div class="nav-section-label">Catalog</div>

        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/admin/categories/index}" th:classappend="${activePage == 'categories'} ? 'active'">
                    <i class="bi bi-tag"></i> Categories
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/products/index}" th:classappend="${activePage == 'products'} ? 'active'">
                    <i class="bi bi-box-seam"></i> Products
                </a>
            </li>
        </ul>

        <div class="nav-section-label">Management</div>

        <ul class="nav flex-column gap-1">
            <li class="nav-item">
                <a th:href="@{/admin/orders}" th:classappend="${activePage == 'orders'} ? 'active'">
                    <i class="bi bi-receipt"></i> Orders
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/settings}" th:classappend="${activePage == 'settings'} ? 'active'">
                    <i class="bi bi-gear"></i> Settings
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <a href="#">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
</aside>

<!-- ── Main ── -->
<div class="main-wrapper">
    <div class="topbar">
        <div class="topbar-title" th:text="${pageTitle} ?: 'Dashboard'"></div>
        <div class="topbar-right">
            <i class="bi bi-bell fs-5 text-secondary"></i>
            <div class="avatar">A</div>
        </div>
    </div>

    <div class="page-content">
        <th:block th:replace="${content}"></th:block>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
