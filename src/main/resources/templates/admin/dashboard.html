<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head></head>
<body>
<div th:fragment="content">

    <!-- Stats Row -->
    <div class="row g-4 mb-5">

        <div class="col-md-3">
            <div class="stat-card card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1" style="font-size:13px">Total Categories</p>
                        <h3 class="fw-bold mb-0" th:text="${totalCategories} ?: '0'"></h3>
                    </div>
                    <div class="stat-icon" style="background:#eff6ff; color:#2563eb">
                        <i class="bi bi-tag"></i>
                    </div>
                </div>
                <a th:href="@{/admin/categories/index}"
                   class="text-decoration-none text-primary mt-3 d-block"
                   style="font-size:13px">
                    View all <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1" style="font-size:13px">Total Products</p>
                        <h3 class="fw-bold mb-0" th:text="${totalProducts} ?: '0'"></h3>
                    </div>
                    <div class="stat-icon" style="background:#f0fdf4; color:#16a34a">
                        <i class="bi bi-box-seam"></i>
                    </div>
                </div>
                <a th:href="@{/admin/products/index}"
                   class="text-decoration-none text-success mt-3 d-block"
                   style="font-size:13px">
                    View all <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1" style="font-size:13px">Total Orders</p>
                        <h3 class="fw-bold mb-0" th:text="${totalOrders} ?: '0'"></h3>
                    </div>
                    <div class="stat-icon" style="background:#fff7ed; color:#ea580c">
                        <i class="bi bi-receipt"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="stat-card card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1" style="font-size:13px">Revenue</p>
                        <h3 class="fw-bold mb-0">$0</h3>
                    </div>
                    <div class="stat-icon" style="background:#fdf4ff; color:#9333ea">
                        <i class="bi bi-currency-dollar"></i>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Quick Links -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card card-modern p-4">
                <h5 class="fw-bold mb-3">Quick Actions</h5>
                <div class="d-flex flex-column gap-2">
                    <a th:href="@{/admin/categories/create}" class="btn btn-primary text-start">
                        <i class="bi bi-plus-lg me-2"></i> Add New Category
                    </a>
                    <a th:href="@{/admin/products/create}" class="btn btn-outline-primary text-start">
                        <i class="bi bi-plus-lg me-2"></i> Add New Product
                    </a>
                    <a th:href="@{/admin/categories/index}" class="btn btn-outline-secondary text-start">
                        <i class="bi bi-tag me-2"></i> Manage Categories
                    </a>
                    <a th:href="@{/admin/products/index}" class="btn btn-outline-secondary text-start">
                        <i class="bi bi-box-seam me-2"></i> Manage Products
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card card-modern p-4">
<!--                <h5 class="fw-bold mb-3">Recent Activity</h5>-->
<!--                <p class="text-muted" style="font-size:14px">No recent activity yet.</p>-->
                <h5 class="fw-bold mb-3">Overview</h5>
                <table class="table table-borderless mb-0" style="font-size:14px">
                    <tbody>
                    <tr>
                        <td class="text-muted ps-0">Categories</td>
                        <td class="fw-semibold" th:text="${totalCategories} ?: '0'"></td>
                        <td class="text-end pe-0">
                            <a th:href="@{/admin/categories/index}" class="btn btn-sm btn-outline-primary">View</a>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-muted ps-0">Products</td>
                        <td class="fw-semibold" th:text="${totalProducts} ?: '0'"></td>
                        <td class="text-end pe-0">
                            <a th:href="@{/admin/products/index}" class="btn btn-sm btn-outline-success">View</a>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-muted ps-0">Orders</td>
                        <td class="fw-semibold" th:text="${totalOrders} ?: '0'"></td>
                        <td class="text-end pe-0">
                            <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-warning">View</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
