<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content})}">
<head></head>
<body>
<div th:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">Categories</h2>
        <div class="d-flex align-items-center gap-3">
            <form method="get" th:action="@{/admin/categories/index}">
                <select name="view" class="form-select" onchange="this.form.submit()" style="width:150px">
                    <option value="cards" th:selected="${viewMode == 'cards'}">Card View</option>
                    <option value="table" th:selected="${viewMode == 'table'}">Table View</option>
                </select>
            </form>
            <a th:href="@{/admin/categories/create}" class="btn btn-primary">+ Add Category</a>
        </div>
    </div>

    <!-- Card View -->
    <div th:if="${viewMode == 'cards'}">
        <div class="row g-4">
            <div class="col-md-4" th:each="cat, iterStat : ${categories}">
                <div class="card card-modern p-4 h-100">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="fw-semibold mb-0" th:text="${cat.nameEn}"></h5>
                        <span class="badge-count" th:text="${iterStat.count}"></span>
                    </div>
                    <p class="text-muted mb-1" th:text="${cat.nameAr}"></p>
                    <p class="mb-3">
                        <span th:class="${cat.type.name() == 'MAIN' ? 'badge bg-primary' : (cat.type.name() == 'SECTION' ? 'badge bg-success' : 'badge bg-warning')}"
                              th:text="${cat.type.name() == 'MAIN' ? 'Main' : (cat.type.name() == 'SECTION' ? 'Section' : 'Sub Section')}">
                        </span>
                    </p>
                    <div class="mt-auto d-flex justify-content-end align-items-center gap-2">
                        <a th:href="@{'/admin/categories/details/' + ${cat.id}}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-eye"></i> View
                        </a>
                        <a th:href="@{'/admin/categories/edit/' + ${cat.id}}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a th:href="@{'/admin/categories/delete/' + ${cat.id}}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Table View -->
    <div th:if="${viewMode == 'table'}">
        <div class="card card-modern p-4">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Name (English)</th>
                    <th>Name (Arabic)</th>
                    <th>Type</th>
                    <th>Parent</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat, iterStat : ${categories}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${cat.nameEn}"></td>
                    <td th:text="${cat.nameAr}"></td>
                    <td>
                        <span th:class="${cat.type.name() == 'MAIN' ? 'badge bg-primary' : (cat.type.name() == 'SECTION' ? 'badge bg-success' : 'badge bg-warning')}"
                              th:text="${cat.type.name() == 'MAIN' ? 'Main' : (cat.type.name() == 'SECTION' ? 'Section' : 'Sub Section')}">
                        </span>
                    </td>
                    <td th:text="${cat.parentNameEn} ?: '—'"></td>
                    <td class="text-end">
                        <a th:href="@{'/admin/categories/details/' + ${cat.id}}" class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-eye"></i> View
                        </a>
                        <a th:href="@{'/admin/categories/edit/' + ${cat.id}}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a th:href="@{'/admin/categories/delete/' + ${cat.id}}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
